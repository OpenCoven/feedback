<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="oc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8E3DFF"/>
      <stop offset="100%" stop-color="#D26BFF"/>
    </linearGradient>
    <radialGradient id="oc-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#D26BFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8E3DFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#050409"/>
  <rect width="64" height="64" rx="14" fill="url(#oc-glow)"/>
  <!-- Coven mark: stylized C + sparkle -->
  <!-- Outer C arc -->
  <path d="M42 14 A22 22 0 1 0 42 50" stroke="url(#oc-grad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Inner accent dot -->
  <circle cx="32" cy="32" r="4" fill="url(#oc-grad)"/>
  <!-- Sparkle rays -->
  <line x1="32" y1="14" x2="32" y2="18" stroke="#D26BFF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="46" x2="32" y2="50" stroke="#D26BFF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="14" y1="32" x2="18" y2="32" stroke="#D26BFF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
