name: Publish @opencoven/feedback-widget
on:
  push:
    tags: ['widget-v*']
  workflow_dispatch:

jobs:
  publish:
    # Only publish from reviewed release tags. Manual dispatches against
    # branches or unprotected tags are skipped before checkout/build scripts run.
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'widget-v') && github.ref_protected
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run --filter @opencoven/feedback-widget test
      - run: bun run --filter @opencoven/feedback-widget typecheck
      - run: bun run --filter @opencoven/feedback-widget build
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing requires npm >= 11.5.1; Node 22 ships with npm 10.x.
      # Pinned because `npm install -g npm@latest` has hit broken self-upgrade
      # chains (missing transitive deps like promise-retry).
      - run: npm install -g npm@11.5.1
      # No NODE_AUTH_TOKEN — OIDC replaces the token; npmjs.com must have a
      # trusted publisher configured for this repo + workflow.
      - run: cd packages/widget && npm publish --provenance --access public
